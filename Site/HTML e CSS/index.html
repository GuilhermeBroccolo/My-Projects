<!DOCTYPE html>
<html lang="ptbr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Web Site Login DevTech</title>
</head>
<body>
    <div class="card-login">
    <h1>DevTech Tecnologias</h1>
    <h2>Faça o seu login</h2>
        <label for ="email">Digite seu Email:</label>
        <input type="email" id="email" name="email" placeholder="e-mail" required>

        <label for ="senha">Digite sua Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="senha" required>
        <div class ="campo-senha">
            <button type="button" onclick="VerSenha()" id="btn-olho">👁️</button>
        </div>
        <button onclick="entrar()">Entrar</button>
    </div>

    <script>
        function entrar() {
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            if (email === "" || senha === "") {
                alert("Preencha todos os campos!");
                return;
            }

            if (email !== "monteiro@gmail.com.br" || senha !== "teste123"){
                alert("Email ou senha incorretos!");
                return;               
            }
            window.location.href = "dashboard.html"; 
        }

        function verSenha() {
    const input = document.getElementById("senha");
    const btn = document.getElementById("btn-olho");

    if (input.type === "password") {
        input.type = "text";
        btn.textContent = "🙈"; // olho fechado quando mostrando
    } else {
        input.type = "password";
        btn.textContent = "👁️"; // olho aberto quando escondendo
    }
}
    </script>
    
</body>
</html>
